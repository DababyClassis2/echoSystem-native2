name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Android SDK
      uses: android-actions/setup-android@v4

    - name: Install required SDK components
      run: |
        sdkmanager "platform-tools" \
                   "platforms;android-34" \
                   "build-tools;34.0.0" \
                   "cmdline-tools;latest"

    - name: Accept licenses
      run: yes | sdkmanager --licenses

    # ⭐ NEW: modern Gradle setup (replaces deprecated gradle-build-action)
    - name: Setup Gradle (cache disabled)
      uses: gradle/actions/setup-gradle@v6
      with:
        cache-disabled: true

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # ⭐ Build APK normally
    - name: Build APK
      run: ./gradlew assembleDebug --stacktrace --info

    # ⭐ NEW: Save full build output to root of repo
    - name: Save build output to file
      run: |
        ./gradlew assembleDebug --stacktrace --info > build_output.txt 2>&1

    # ⭐ NEW: Commit build log to repo root (overwrites each run)
    - name: Commit build log
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add build_output.txt
        git commit -m "Update build output log" || echo "No changes to commit"
        git push
